<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Carta Nomo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="glass appbar admin-bar" role="banner">
      <div class="title">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 2c-2.5 0-4.5 2-4.5 4.5S9.5 11 12 11s4.5-2 4.5-4.5S14.5 2 12 2Zm0 10c-4.4 0-8 2.2-8 5v1.5c0 .8.7 1.5 1.5 1.5h13c.8 0 1.5-.7 1.5-1.5V17c0-2.8-3.6-5-8-5Z" fill="currentColor" opacity=".9"/>
        </svg>
        <div>
          <h1>Administración</h1>
          <p class="subtitle">Gestiona números y contenidos.</p>
        </div>
      </div>
      <div class="toolbar admin-actions" role="toolbar" aria-label="Acciones">
        <span id="userInfo" class="subtitle" aria-live="polite">Sesión: —</span>
        <a href="index.html" class="btn">Vista pública</a>
        <button id="logoutBtn" class="btn">Salir</button>
        <button id="exportBtn" class="btn">Exportar JSON</button>
        <button id="exportCsvBtn" class="btn">Exportar CSV</button>
        <button id="importBtn" class="btn">Importar</button>
        <button id="importCsvBtn" class="btn">Importar CSV</button>
      </div>
    </header>

    <section class="glass card" aria-labelledby="gridLabel">
      <h2 id="gridLabel" class="subtitle visually-hidden">Selección de números</h2>
      <div id="grid" class="grid" role="grid" aria-describedby="gridHelp"></div>
      <p id="gridHelp" class="subtitle" style="padding: 6px 6px 0">Consejo: usa ← → para moverte, Enter para escuchar.</p>
      <div id="output" aria-live="polite" aria-atomic="true"></div>
      <div id="importProgress" class="hidden">
        <progress id="importProgressBar" value="0" max="100"></progress>
        <p id="importProgressText" class="subtitle">0%</p>
      </div>
      <p id="importSummary" class="subtitle" aria-live="polite"></p>
    </section>
  </div>

  <!-- Sheet edición -->
  <div id="editBackdrop" class="backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="glass sheet" role="document">
      <header><h2>Editar número</h2></header>
      <div class="body">
        <div class="row"><label for="numSel">Número</label><input type="number" id="numSel" min="1" max="100" inputmode="numeric" /></div>
        <div class="row"><label for="palabra">Palabra</label><input type="text" id="palabra" placeholder="Escribe la palabra…" /></div>
        <div class="row"><label for="descripcion">Descripción</label><input type="text" id="descripcion" placeholder="Añade una descripción…" /></div>
        <div class="row"><label for="ingredientes">Ingredientes</label><textarea id="ingredientes" rows="4" placeholder="Un ingrediente por línea…"></textarea></div>
        <div class="row"><label for="imagen">Imagen (opcional)</label><input type="file" id="imagen" accept="image/*" /></div>
      </div>
      <div class="actions">
        <button id="cancelarBtn" class="btn">Cancelar</button>
        <button id="guardarBtn" class="btn primary">Guardar</button>
      </div>
    </div>
  </div>

  <!-- Popup de vista — Atelier (con botones admin) -->
  <div id="viewBackdrop" class="popup-host" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="viewTitle">
    <div class="popup-shell" id="viewShell" role="document">
      <div class="popup popup--atelier">
        <div class="atl-bg"><div class="atl-paper"></div></div>
        <header class="atl-header">
          <button id="viewCloseBtn" class="atl-close" aria-label="Cerrar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <div class="atl-no">
            <span class="atl-no-pre">N<sup>o</sup></span>
            <span id="viewNumber" class="atl-no-val">—</span>
          </div>
          <div style="width:32px"></div>
        </header>

        <div id="viewDish3DStage" class="atl-stage"></div>

        <div class="atl-body">
          <h2 id="viewTitle" class="atl-name">—</h2>
          <p id="viewDesc" class="atl-desc">—</p>
          <div id="viewIngredientes" class="ing-atelier hidden">
            <div class="ing-atelier-label">ingredientes</div>
            <ul class="ing-list"></ul>
          </div>
          <div id="viewAlergenos" class="alg-atelier hidden">
            <div class="alg-atelier-label">alérgenos</div>
            <div class="alg-atelier-chips"></div>
          </div>
        </div>

        <div class="atl-footer">
          <button id="viewSpeakBtn" class="atl-listen">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 10v4a1 1 0 001 1h3l4 3V6L7 9H4a1 1 0 00-1 1z" fill="currentColor"/><path d="M15 9a4 4 0 010 6M18 6a8 8 0 010 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
            Escuchar
          </button>
          <div id="viewAdminActions" class="atl-admin-actions hidden">
            <button id="viewEditBtn" class="atl-btn-edit">Editar</button>
            <button id="viewDeleteBtn" class="atl-btn-delete">Borrar</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script type="module" src="app.js"></script>
  <script type="module" src="src/admin.js"></script>
</body>
</html>
