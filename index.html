<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carta Nomo · Sarria</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">
    <header class="glass appbar" role="banner">
      <div class="title">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 2c-2.5 0-4.5 2-4.5 4.5S9.5 11 12 11s4.5-2 4.5-4.5S14.5 2 12 2Zm0 10c-4.4 0-8 2.2-8 5v1.5c0 .8.7 1.5 1.5 1.5h13c.8 0 1.5-.7 1.5-1.5V17c0-2.8-3.6-5-8-5Z" fill="currentColor" opacity=".9"/>
        </svg>
        <div>
          <h1>Carta Nomo · Sarria</h1>
          <p class="subtitle">Toca un número para ver y escuchar. Azul = libre/no existe en menú.</p>
        </div>
      </div>
      <div class="toolbar" role="toolbar" aria-label="Acciones">
        <span id="userInfo" class="subtitle" aria-live="polite">Sesión: invitado</span>
        <button id="loginBtn" class="btn">Iniciar sesión</button>
      </div>
    </header>

    <!-- Barra búsqueda + filtro -->
    <div class="carta-tools">
      <label class="carta-search">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="6.5" stroke="currentColor" stroke-width="1.6"/><path d="M20 20l-3.6-3.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar plato…" aria-label="Buscar plato" />
        <button class="carta-search-clear hidden" id="searchClear" aria-label="Borrar búsqueda">×</button>
      </label>
      <button class="carta-filter" id="filterBtn" aria-label="Filtrar por alérgenos">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 6h16M7 12h10M10 18h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>

    <section class="glass card" aria-labelledby="gridLabel">
      <h2 id="gridLabel" class="subtitle" style="position:absolute;left:-9999px">Selección de números</h2>
      <div id="grid" class="grid" role="grid" aria-describedby="gridHelp"></div>
      <p id="gridHelp" class="subtitle" style="padding: 6px 6px 0">Consejo: usa ← → para moverte, Enter para escuchar.</p>
      <div id="output" aria-live="polite" aria-atomic="true"></div>
    </section>
  </div>

  <!-- Modal inicio de sesión -->
  <div id="loginBackdrop" class="backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="glass sheet" role="document">
      <header><h2>Iniciar sesión</h2></header>
      <div class="body">
        <div class="row">
          <label for="loginEmail">Correo</label>
          <input type="email" id="loginEmail" required aria-invalid="false" />
          <div id="loginEmailError" class="error" aria-live="polite"></div>
        </div>
        <div class="row">
          <label for="loginPass">Contraseña</label>
          <input type="password" id="loginPass" required aria-invalid="false" />
          <div id="loginPassError" class="error" aria-live="polite"></div>
        </div>
      </div>
      <div class="actions">
        <button id="loginCancel" class="btn">Cancelar</button>
        <button id="loginSubmit" class="btn primary">Entrar</button>
      </div>
    </div>
  </div>

  <!-- Popup de vista — Atelier -->
  <div id="viewBackdrop" class="popup-host" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="viewTitle">
    <div class="popup-shell" id="viewShell" role="document">
      <div class="popup popup--atelier">
        <div class="atl-bg"><div class="atl-paper"></div></div>
        <header class="atl-header">
          <button id="viewCloseBtn" class="atl-close" aria-label="Cerrar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 5l14 14M19 5L5 19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
          <div class="atl-no">
            <span class="atl-no-pre">N<sup>o</sup></span>
            <span id="viewNumber" class="atl-no-val">—</span>
          </div>
          <div style="width:32px"></div>
        </header>

        <div id="viewDish3DStage" class="atl-stage"></div>

        <div class="atl-body">
          <h2 id="viewTitle" class="atl-name">—</h2>
          <p id="viewDesc" class="atl-desc">—</p>
          <div id="viewAlergenos" class="alg-atelier hidden">
            <div class="alg-atelier-label">alérgenos</div>
            <div class="alg-atelier-chips"></div>
          </div>
        </div>

        <div class="atl-footer">
          <button id="viewSpeakBtn" class="atl-listen">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M3 10v4a1 1 0 001 1h3l4 3V6L7 9H4a1 1 0 00-1 1z" fill="currentColor"/><path d="M15 9a4 4 0 010 6M18 6a8 8 0 010 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
            Escuchar
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Filter sheet -->
  <div id="filterBackdrop" class="filter-host" role="dialog" aria-modal="true" aria-label="Filtrar alérgenos">
    <div class="filter-sheet">
      <div class="filter-handle"></div>
      <div class="filter-head">
        <h2>Ocultar platos con…</h2>
        <button id="filterClear" class="filter-clear">Borrar todo</button>
      </div>
      <div id="filterList" class="filter-list"></div>
      <div class="filter-foot">
        <button id="filterDone" class="filter-done">Hecho</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
